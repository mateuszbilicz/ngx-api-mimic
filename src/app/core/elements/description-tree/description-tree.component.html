<div class="flex flex-col w-full mb-1">
  <div
    class="flex items-start gap-2 p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800/30 transition-colors cursor-pointer outline-none focus-visible:ring-2 focus-visible:ring-blue-500 select-none"
    tabindex="0" (click)="toggle()" (keydown.enter)="toggle()" (keydown.space)="$event.preventDefault(); toggle()">

    <div class="flex items-center justify-center pt-1 transition-transform duration-200" [class.rotate-90]="expanded()">
      <i class="pi pi-chevron-right text-gray-400 text-sm font-bold"></i>
    </div>

    <div class="flex items-center gap-2 flex-grow flex-wrap mt-[2px]">
      @if (icon()) {
      <i class="text-[17px] {{icon()}}"></i>
      }
      <span class="font-medium text-gray-500 font-mono text-[15px] break-all leading-tight">{{
        title() }}</span>
    </div>
  </div>

  @if (expanded()) {
  <div class="flex flex-col gap-2 mt-1 mb-2 ml-[14px] pl-[18px] border-l-2 border-gray-200 dark:border-gray-700/60">
    <p class="text-gray-600 dark:text-gray-400 text-[15px] leading-relaxed m-0 whitespace-pre-line">{{ description() }}
    </p>

    @if (url()) {
    <div class="mt-1">
      <p-button icon="pi pi-external-link" label="Read more" severity="info" size="small" [outlined]="true"
        [routerLink]="url()" />
    </div>
    }

    @if (items()?.length) {
    <div class="flex flex-col w-full mt-2 gap-1">
      @for (item of items(); track item.title) {
      <app-description-tree [branch]="item" />
      }
    </div>
    }
  </div>
  }
</div>
